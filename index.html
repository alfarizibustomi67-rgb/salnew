<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalNew V.100.7 Clean</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const userDatabase = {
            "Tomi": { pass: "11", phone: "081212" },
            "T": { pass: "12", phone: "085858" }
        };

        let currentBalance = 0;

        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if (userDatabase[u] && userDatabase[u].pass === p) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { Swal.fire('Gagal', 'PIN Salah!', 'error'); }
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-name').innerText = user;
            const phone = userDatabase[user].phone;

            onValue(ref(db, 'users/' + phone), (snap) => {
                const data = snap.val();
                if (data) {
                    currentBalance = data.saldo;
                    document.getElementById('u-balance').innerText = (user === "Tomi") ? "Rp 100.000" : "Rp " + data.saldo.toLocaleString('id-ID');
                    if(user === "Tomi") document.getElementById('vip-tag').style.display = 'inline-block';
                }
            });

            const hRef = query(ref(db, 'history/' + phone), limitToLast(8));
            onValue(hRef, (snap) => {
                const list = document.getElementById('hist-list');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const item = child.val();
                    const isIn = item.type === "MASUK";
                    list.innerHTML = `<div class="h-card"><div class="h-icon ${isIn ? 'in' : 'out'}"><i data-lucide="${isIn ? 'arrow-down-left' : 'arrow-up-right'}"></i></div><div style="flex:1; margin-left:15px;"><p style="font-weight:700; font-size:13px;">${item.note || 'Transaksi'}</p><p style="font-size:10px; color:#aaa;">${item.date}</p></div><p style="font-weight:800; color:${isIn ? '#2ecc71' : '#e74c3c'}">${isIn ? '+' : '-'} Rp ${item.amt.toLocaleString()}</p></div>` + list.innerHTML;
                });
                lucide.createIcons();
            });
        }

        async function processTransaction(amount, note) {
            const user = sessionStorage.getItem('currentUser');
            const phone = userDatabase[user].phone;
            if (user === "Tomi" || currentBalance >= amount) {
                const now = new Date().toLocaleString();
                if(user !== "Tomi") await update(ref(db, 'users/' + phone), { saldo: currentBalance - amount });
                await push(ref(db, 'history/' + phone), { type: 'KELUAR', amt: amount, date: now, note: note });
                Swal.fire('Sukses!', note, 'success');
                return true;
            } else { Swal.fire('Gagal', 'Saldo Kurang', 'error'); return false; }
        }

        window.actionKirim = async () => {
            const { value: target } = await Swal.fire({ title: 'Tujuan Nomor', input: 'text' });
            const { value: amt } = await Swal.fire({ title: 'Jumlah Rp', input: 'number' });
            if (target && amt > 0) {
                const sender = sessionStorage.getItem('currentUser');
                const tRef = ref(db, 'users/' + target);
                const tSnap = await get(tRef);
                if (tSnap.exists()) {
                    const amount = parseInt(amt);
                    if (sender === "Tomi" || currentBalance >= amount) {
                        const now = new Date().toLocaleString();
                        await update(tRef, { saldo: tSnap.val().saldo + amount });
                        push(ref(db, 'history/' + target), { type: 'MASUK', amt: amount, date: now, note: 'Dari ' + sender });
                        if(sender !== "Tomi") await update(ref(db, 'users/' + userDatabase[sender].phone), { saldo: currentBalance - amount });
                        push(ref(db, 'history/' + userDatabase[sender].phone), { type: 'KELUAR', amt: amount, date: now, note: 'Kirim ke ' + target });
                        Swal.fire('Berhasil!', 'Saldo Terkirim!', 'success');
                    } else { Swal.fire('Gagal', 'Saldo Kurang', 'error'); }
                } else { Swal.fire('Error', 'Nomor Tidak Ada', 'error'); }
            }
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };
    </script>

    <style>
        :root { --blue: #108ee9; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f8fbff; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 480px; min-height: 100vh; background: #fff; display: none; }
        
        .header { background: var(--blue); color: #fff; padding: 50px 25px 30px 25px; border-radius: 0 0 40px 40px; position: relative; }
        
        .s-card { 
            background: #fff; 
            margin: -25px 20px 25px 20px; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid #f1f1f1;
            position: relative;
            z-index: 5;
        }

        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .m-item { text-align: center; cursor: pointer; }
        .m-icon { background: rgba(255,255,255,0.15); padding: 12px; border-radius: 15px; display: inline-block; margin-bottom: 5px; backdrop-filter: blur(5px); }

        .history { padding: 25px; }
        .h-card { display: flex; align-items: center; padding: 15px; background: #f9f9f9; border-radius: 18px; margin-bottom: 10px; }
        .h-icon { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .h-icon.in { background: #e8f8f0; color: #2ecc71; }
        .h-icon.out { background: #fdf2f2; color: #e74c3c; }

        #vip-tag { background: #ffd700; color: #000; font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: 900; display: none; }
        #login-screen { width: 100%; max-width: 480px; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
        input { width: 100%; padding: 18px; margin: 10px 0; border: none; background: #f0f4f8; border-radius: 15px; outline: none; font-weight: 600; }
        .btn-l { width: 100%; padding: 18px; background: var(--blue); color: #fff; border: none; border-radius: 15px; font-weight: 800; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="width:100%; text-align:center;">
        <h2 style="color:var(--blue);">SalNew Clean</h2>
        <p style="font-size:12px; color:#aaa; margin-bottom:30px;">V.100.7 - No Card Edition</p>
        <input type="text" id="inp-user" placeholder="Username">
        <input type="password" id="inp-pass" placeholder="PIN">
        <button class="btn-l" onclick="login()">LOGIN</button>
    </div>
</div>

<div id="main-app" class="app">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Halo, <span id="u-name"></span> <span id="vip-tag">VIP</span></h3>
            <i data-lucide="bell" style="width:20px; opacity:0.6;"></i>
        </div>
        <div class="grid-menu">
            <div class="m-item" onclick="actionKirim()"><div class="m-icon"><i data-lucide="send"></i></div><p style="font-size:10px;">Kirim</p></div>
            <div class="m-item" onclick="Swal.fire('Pulsa','Segera Hadir','info')"><div class="m-icon"><i data-lucide="smartphone"></i></div><p style="font-size:10px;">Pulsa</p></div>
            <div class="m-item" onclick="Swal.fire('Scan','Gunakan Tombol Bayar','info')"><div class="m-icon"><i data-lucide="qr-code"></i></div><p style="font-size:10px;">Scan</p></div>
            <div class="m-item" onclick="logout()"><div class="m-icon"><i data-lucide="log-out"></i></div><p style="font-size:10px;">Keluar</p></div>
        </div>
    </div>

    <div class="s-card">
        <p style="font-size: 10px; color:#aaa; font-weight: 800;">SALDO SULTAN</p>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
            <h2 id="u-balance" style="font-size: 26px; color:#222;">Rp 0</h2>
            <button onclick="actionKirim()" style="background:var(--blue); color:#fff; border:none; padding:8px 15px; border-radius:12px; font-size:11px; font-weight:bold;">BAYAR</button>
        </div>
    </div>

    <div class="history">
        <h4 style="font-size:14px; color:#333; margin-bottom:15px;">Riwayat Transaksi</h4>
        <div id="hist-list"></div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
