<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalNew V.110.13 - Kaget Edition</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const userDatabase = {
            "Tomi": { pass: "11", phone: "081212" },
            "T": { pass: "12", phone: "087878" }
        };

        let currentBalance = 0;
        const sndIn = new Audio('https://assets.mixkit.co/active_storage/sfx/2015/2015-preview.mp3');

        // FUNGSI CEK DANA KAGET DARI URL
        async function checkDanaKaget(phone) {
            const urlParams = new URLSearchParams(window.location.search);
            const kagetAmt = urlParams.get('kaget'); // Misal: salnew.github.io?kaget=5000
            
            if (kagetAmt && !sessionStorage.getItem('kagetClaimed')) {
                const amount = parseInt(kagetAmt);
                const now = new Date().toLocaleString();
                
                // Update Saldo di Firebase
                const userRef = ref(db, 'users/' + phone);
                const snap = await get(userRef);
                const newTotal = (snap.val().saldo || 0) + amount;
                
                await update(userRef, { saldo: newTotal });
                await push(ref(db, 'history/' + phone), { 
                    type: 'MASUK', 
                    amt: amount, 
                    date: now, 
                    note: 'DANA Kaget Terklaim!' 
                });

                sndIn.play();
                Swal.fire({
                    title: 'DANA Kaget!',
                    text: 'Selamat! Kamu dapet Rp ' + amount.toLocaleString(),
                    icon: 'success',
                    backdrop: `rgba(0,123,255,0.4) url("https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKSjPQCp9KxyF1m/giphy.gif") center top no-repeat`
                });
                
                sessionStorage.setItem('kagetClaimed', 'true');
                // Bersihkan URL agar tidak double claim saat refresh
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if (userDatabase[u] && userDatabase[u].pass === p) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { Swal.fire('Gagal', 'PIN Salah!', 'error'); }
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-name').innerText = user;
            const phone = userDatabase[user].phone;

            // Cek Kaget setelah login
            checkDanaKaget(phone);

            onValue(ref(db, 'users/' + phone), (snap) => {
                const data = snap.val();
                if (data) {
                    currentBalance = data.saldo;
                    document.getElementById('u-balance').innerText = (user === "Tomi") ? "Rp 100.000" : "Rp " + data.saldo.toLocaleString('id-ID');
                    if(user === "Tomi") document.getElementById('vip-tag').style.display = 'inline-block';
                }
            });

            const hRef = query(ref(db, 'history/' + phone), limitToLast(10));
            onValue(hRef, (snap) => {
                const list = document.getElementById('hist-list');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const item = child.val();
                    const isIn = item.type === "MASUK";
                    list.innerHTML = `<div class="h-card"><div class="h-icon ${isIn ? 'in' : 'out'}"><i data-lucide="${isIn ? 'arrow-down-left' : 'arrow-up-right'}"></i></div><div style="flex:1; margin-left:15px;"><p style="font-weight:700; font-size:13px;">${item.note || 'Transaksi'}</p><p style="font-size:10px; color:#999;">${item.date}</p></div><p style="font-weight:800; color:${isIn ? '#2ecc71' : '#e74c3c'}">${isIn ? '+' : '-'} Rp ${item.amt.toLocaleString()}</p></div>` + list.innerHTML;
                });
                lucide.createIcons();
            });
        }

        window.actionKirim = async () => {
            const { value: target } = await Swal.fire({ title: 'Transfer', input: 'text', inputPlaceholder: 'Nomor HP' });
            const { value: amt } = await Swal.fire({ title: 'Jumlah', input: 'number' });
            if (target && amt > 0) {
                const sender = sessionStorage.getItem('currentUser');
                const tRef = ref(db, 'users/' + target);
                const tSnap = await get(tRef);
                if (tSnap.exists()) {
                    const amount = parseInt(amt);
                    const now = new Date().toLocaleString();
                    await update(tRef, { saldo: (tSnap.val().saldo || 0) + amount });
                    push(ref(db, 'history/' + target), { type: 'MASUK', amt: amount, date: now, note: 'Dari ' + sender });
                    if(sender !== "Tomi") await update(ref(db, 'users/' + userDatabase[sender].phone), { saldo: currentBalance - amount });
                    push(ref(db, 'history/' + userDatabase[sender].phone), { type: 'KELUAR', amt: amount, date: now, note: 'Kirim ke ' + target });
                    Swal.fire('Berhasil!', 'Transfer Sukses', 'success');
                } else { Swal.fire('Error', 'Nomor Tidak Ada', 'error'); }
            }
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };
    </script>

    <style>
        :root { --blue: #007aff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f4f8; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 480px; min-height: 100vh; background: #f0f4f8; display: none; }
        .header { background: linear-gradient(135deg, #007aff, #5856d6); color: #fff; padding: 60px 25px 100px 25px; border-radius: 0 0 50px 50px; }
        .s-card { background: #fff; margin: -70px 20px 25px 20px; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; z-index: 5; border: 1px solid rgba(255,255,255,0.8); }
        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .m-item { text-align: center; cursor: pointer; }
        .m-icon { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 20px; display: inline-block; margin-bottom: 8px; backdrop-filter: blur(10px); }
        .history { padding: 0 25px 40px 25px; }
        .h-card { display: flex; align-items: center; padding: 18px; background: #fff; border-radius: 25px; margin-bottom: 12px; }
        .h-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .h-icon.in { background: #eefdf5; color: #2ecc71; }
        .h-icon.out { background: #fff5f5; color: #e74c3c; }
        #vip-tag { background: #ffcc00; color: #000; font-size: 10px; padding: 4px 10px; border-radius: 10px; font-weight: 900; }
        #login-screen { width: 100%; max-width: 480px; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fff; }
        input { width: 100%; padding: 20px; margin: 10px 0; border: none; background: #f5f9ff; border-radius: 20px; outline: none; font-weight: 600; }
        .btn-l { width: 100%; padding: 20px; background: var(--blue); color: #fff; border: none; border-radius: 20px; font-weight: 800; font-size: 16px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="width:100%; text-align:center;">
        <div style="background:var(--blue); width:80px; height:80px; border-radius:30px; margin:0 auto 20px auto; display:flex; align-items:center; justify-content:center; color:#fff;"><i data-lucide="gift" size="40"></i></div>
        <h2 style="color:#222;">SalNew Kaget</h2>
        <p style="font-size:12px; color:#aaa; margin-bottom:30px;">V.110.13 - Scan & Claim</p>
        <input type="text" id="inp-user" placeholder="Username">
        <input type="password" id="inp-pass" placeholder="PIN">
        <button class="btn-l" onclick="login()">Buka SalNew</button>
    </div>
</div>

<div id="main-app" class="app">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><p style="font-size:12px; opacity:0.8;">Selamat Datang,</p><h3 style="font-size:22px;"><span id="u-name"></span> <span id="vip-tag" style="display:none;">VIP</span></h3></div>
            <div onclick="logout()" style="background:rgba(255,255,255,0.2); padding:10px; border-radius:18px;"><i data-lucide="log-out" size="20"></i></div>
        </div>
        <div class="grid-menu">
            <div class="m-item" onclick="actionKirim()"><div class="m-icon"><i data-lucide="send"></i></div><p style="font-size:11px; font-weight:600;">Kirim</p></div>
            <div class="m-item" onclick="Swal.fire('Fitur Scan','Gunakan QR Code DANA Kaget','info')"><div class="m-icon"><i data-lucide="qr-code"></i></div><p style="font-size:11px; font-weight:600;">Scan</p></div>
            <div class="m-item" onclick="Swal.fire('Hadiah','Cek DANA Kaget','success')"><div class="m-icon"><i data-lucide="gift"></i></div><p style="font-size:11px; font-weight:600;">Kaget</p></div>
            <div class="m-item" onclick="logout()"><div class="m-icon"><i data-lucide="power"></i></div><p style="font-size:11px; font-weight:600;">Off</p></div>
        </div>
    </div>

    <div class="s-card">
        <p style="font-size: 11px; color:#999; font-weight: 800;">TOTAL SALDO</p>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <h2 id="u-balance" style="font-size: 32px; color:#222;">Rp 0</h2>
            <button onclick="actionKirim()" style="background:var(--blue); color:#fff; border:none; padding:10px 20px; border-radius:15px; font-weight:800;">KIRIM</button>
        </div>
    </div>

    <div class="history">
        <h4 style="font-size:15px; font-weight:800; color:#222; margin-bottom:15px;">Riwayat Saldo</h4>
        <div id="hist-list"></div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
