<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#108ee9">
    
    <title>SalNew Sultan</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userPhones = { "Tomi": "081212", "User": "087878" };
        let saldoTerakhir = 0;

        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if ((u === "Tomi" && p === "11") || (u === "User" && p === "user")) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { 
                Swal.fire({ icon: 'error', title: 'Akses Gagal', text: 'Cek Nama & Password!' });
            }
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display').innerText = user;
            const phone = userPhones[user];

            onValue(ref(db, 'users/' + phone), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    let val = (user === "Tomi") ? "∞ Infinity" : "Rp " + data.saldo.toLocaleString('id-ID');
                    document.getElementById('user-balance').innerText = val;
                    if(user === "Tomi") document.getElementById('premium-tag').style.display = "block";
                    
                    if (saldoTerakhir !== 0 && data.saldo > saldoTerakhir) {
                        new Audio('https://www.soundjay.com/misc/sounds/coins-purchase-1.mp3').play().catch(()=>{});
                        Swal.fire({ title: 'DANA MASUK!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                    }
                    saldoTerakhir = data.saldo;
                }
            });
        }

        window.prosesKirim = async function() {
            const sender = sessionStorage.getItem('currentUser');
            const sPhone = userPhones[sender];
            const tPhone = document.getElementById('target-phone').value;
            const amt = parseInt(document.getElementById('amt-kirim').value);

            if (!tPhone || !amt || amt <= 0) return Swal.fire('Error', 'Data Salah', 'error');

            const tRef = ref(db, 'users/' + tPhone);
            const sRef = ref(db, 'users/' + sPhone);

            const tSnap = await get(tRef);
            if (!tSnap.exists()) return Swal.fire('Gagal', 'Nomor Tidak Ada!', 'error');

            const sSnap = await get(sRef);
            if (sender === "Tomi" || (sSnap.val() && sSnap.val().saldo >= amt)) {
                await update(tRef, { saldo: tSnap.val().saldo + amt });
                if(sender !== "Tomi") await update(sRef, { saldo: sSnap.val().saldo - amt });
                
                push(ref(db, 'history/' + sPhone), { type: 'KELUAR', amt: amt, date: new Date().toLocaleString() });
                push(ref(db, 'history/' + tPhone), { type: 'MASUK', amt: amt, date: new Date().toLocaleString() });

                Swal.fire('Berhasil!', 'Saldo Terkirim', 'success');
                closeModal('modal-kirim');
            } else {
                Swal.fire('Gagal', 'Saldo Tidak Cukup', 'error');
            }
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.logout = () => { sessionStorage.clear(); location.reload(); };
        lucide.createIcons();
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f4f8; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        /* FULLSCREEN STYLE */
        .app-container { width: 100%; max-width: 480px; background: white; min-height: 100vh; display: none; }
        
        .header { background: #108ee9; color: white; padding: 70px 25px 90px 25px; border-radius: 0 0 50px 50px; text-align: center; }
        
        .card-sultan { background: white; margin: -60px 25px 25px 25px; padding: 35px 25px; border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.08); text-align: center; }
        
        .btn-sultan { background: #108ee9; color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 16px; box-shadow: 0 10px 20px rgba(16, 142, 233, 0.2); cursor: pointer; transition: 0.2s; }
        .btn-sultan:active { transform: scale(0.95); background: #0c7cd1; }

        #premium-tag { background: #FFD700; color: #333; font-size: 11px; font-weight: 900; padding: 5px 15px; border-radius: 25px; width: fit-content; margin: 0 auto 15px auto; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); }

        #login-screen { width: 100%; max-width: 480px; display: flex; align-items: center; padding: 25px; background: #fff; }
        .login-box { width: 100%; text-align: center; }
        input { width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #f0f0f0; border-radius: 20px; background: #fafafa; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #108ee9; background: #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: white; padding: 40px 30px; border-radius: 40px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div style="font-size: 50px; margin-bottom: 10px;">🛡️</div>
        <h1 style="color: #108ee9; letter-spacing: -1px;">SalNew Sultan</h1>
        <p style="color: #bbb; margin-bottom: 30px; font-weight: 500;">Secure Mobile Wallet</p>
        <input type="text" id="inp-user" placeholder="Username">
        <input type="password" id="inp-pass" placeholder="Password">
        <button class="btn-sultan" onclick="login()">LOGIN SULTAN</button>
    </div>
</div>

<div id="main-app" class="app-container">
    <div class="header">
        <div id="premium-tag" style="display:none;">PREMIUM VIP</div>
        <p style="font-size: 15px; opacity: 0.9;">Halo, <b id="user-display"></b></p>
    </div>

    <div class="card-sultan">
        <p style="color: #aaa; font-size: 13px; font-weight: 600; text-transform: uppercase;">Saldo Sultan Kamu</p>
        <h1 id="user-balance" style="font-size: 38px; color: #1a1a1a; margin: 15px 0;">Rp 0</h1>
        <button class="btn-sultan" onclick="openModal('modal-kirim')">KIRIM DANA</button>
    </div>

    <div style="padding: 0 25px; margin-top: 30px;">
        <button onclick="logout()" style="width: 100%; padding: 15px; border: none; background: #fff1f1; color: #ff4757; border-radius: 20px; font-weight: bold; font-size: 14px;">KELUAR AKUN</button>
    </div>
</div>

<div id="modal-kirim" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 25px;">Transfer Dana</h2>
        <input type="text" id="target-phone" placeholder="Nomor HP Penerima">
        <input type="number" id="amt-kirim" placeholder="Nominal Rp">
        <button class="btn-sultan" onclick="prosesKirim()">KIRIM SEKARANG</button>
        <button onclick="closeModal('modal-kirim')" style="margin-top: 20px; border: none; background: none; color: #ccc; font-weight: bold;">BATAL</button>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
