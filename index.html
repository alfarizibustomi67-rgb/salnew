<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalNew V.100.3 Full Action</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const userDatabase = {
            "Tomi": { pass: "11", phone: "081212" },
            "User1": { pass: "121212", phone: "081111" },
            "User2": { pass: "232323", phone: "082222" }
        };

        let currentBalance = 0;

        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if (userDatabase[u] && userDatabase[u].pass === p) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { Swal.fire('Gagal', 'PIN Salah!', 'error'); }
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-name').innerText = user;
            const phone = userDatabase[user].phone;

            onValue(ref(db, 'users/' + phone), (snap) => {
                const data = snap.val();
                if (data) {
                    currentBalance = data.saldo;
                    document.getElementById('u-balance').innerText = (user === "Tomi") ? "∞ Infinity" : "Rp " + data.saldo.toLocaleString('id-ID');
                }
            });

            const hRef = query(ref(db, 'history/' + phone), limitToLast(8));
            onValue(hRef, (snap) => {
                const list = document.getElementById('hist-list');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const item = child.val();
                    const isIn = item.type === "MASUK";
                    list.innerHTML = `
                        <div class="h-card">
                            <div class="h-icon ${isIn ? 'in' : 'out'}"><i data-lucide="${isIn ? 'arrow-down-left' : 'arrow-up-right'}"></i></div>
                            <div style="flex:1; margin-left:15px;">
                                <p style="font-weight:700; font-size:14px;">${item.note || (isIn ? 'Saldo Masuk' : 'Saldo Keluar')}</p>
                                <p style="font-size:10px; color:#aaa;">${item.date}</p>
                            </div>
                            <p style="font-weight:800; color:${isIn ? '#2ecc71' : '#e74c3c'}">${isIn ? '+' : '-'} Rp ${item.amt.toLocaleString()}</p>
                        </div>
                    ` + list.innerHTML;
                });
                lucide.createIcons();
            });
        }

        // FUNGSI TRANSAKSI UMUM (POTONG SALDO)
        async function processTransaction(amount, note) {
            const user = sessionStorage.getItem('currentUser');
            const phone = userDatabase[user].phone;
            if (user === "Tomi" || currentBalance >= amount) {
                const now = new Date().toLocaleString();
                if(user !== "Tomi") {
                    await update(ref(db, 'users/' + phone), { saldo: currentBalance - amount });
                }
                await push(ref(db, 'history/' + phone), { type: 'KELUAR', amt: amount, date: now, note: note });
                Swal.fire('Berhasil!', note + ' Sukses', 'success');
                return true;
            } else {
                Swal.fire('Gagal', 'Saldo tidak mencukupi', 'error');
                return false;
            }
        }

        // 1. PERBAIKAN TOMBOL PULSA
        window.actionPulsa = async () => {
            const { value: target } = await Swal.fire({ title: 'Beli Pulsa', input: 'text', inputPlaceholder: 'Masukkan Nomor HP' });
            if (!target) return;
            const { value: nominal } = await Swal.fire({
                title: 'Pilih Nominal',
                input: 'select',
                inputOptions: { '5000': 'Rp 5.000', '10000': 'Rp 10.000', '50000': 'Rp 50.000' }
            });
            if (nominal) {
                processTransaction(parseInt(nominal), 'Beli Pulsa ke ' + target);
            }
        };

        // 2. PERBAIKAN TOMBOL PINDAI/SCAN
        window.actionScan = async () => {
            Swal.fire({
                title: 'Scan QR Code',
                text: 'Kamera tidak tersedia...',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Simulasi Scan Merchant'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const { value: amt } = await Swal.fire({ title: 'Bayar Merchant', input: 'number', inputPlaceholder: 'Masukkan Jumlah Bayar' });
                    if (amt > 0) {
                        processTransaction(parseInt(amt), 'Bayar QRIS Merchant');
                    }
                }
            });
        };

        // 3. TOMBOL KIRIM (Tetap sama, antar device)
        window.actionKirim = async () => {
            const { value: target } = await Swal.fire({ title: 'Transfer ke HP', input: 'text' });
            if (!target) return;
            const { value: amt } = await Swal.fire({ title: 'Jumlah Rp', input: 'number' });
            if (target && amt > 0) {
                const sender = sessionStorage.getItem('currentUser');
                const tRef = ref(db, 'users/' + target);
                const tSnap = await get(tRef);
                if (tSnap.exists()) {
                    const amount = parseInt(amt);
                    if (sender === "Tomi" || currentBalance >= amount) {
                        const now = new Date().toLocaleString();
                        await update(tRef, { saldo: tSnap.val().saldo + amount });
                        push(ref(db, 'history/' + target), { type: 'MASUK', amt: amount, date: now, note: 'Terima dari ' + sender });
                        
                        if(sender !== "Tomi") {
                            await update(ref(db, 'users/' + userDatabase[sender].phone), { saldo: currentBalance - amount });
                        }
                        push(ref(db, 'history/' + userDatabase[sender].phone), { type: 'KELUAR', amt: amount, date: now, note: 'Kirim ke ' + target });
                        Swal.fire('Berhasil!', 'Saldo Terkirim!', 'success');
                    } else { Swal.fire('Gagal', 'Saldo Kurang', 'error'); }
                } else { Swal.fire('Error', 'Nomor Tidak Terdaftar', 'error'); }
            }
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };
    </script>

    <style>
        :root { --blue: #108ee9; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f4f8; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 480px; min-height: 100vh; background: #fff; display: none; position: relative; }
        .header { background: var(--blue); color: #fff; padding: 60px 25px 40px 25px; border-radius: 0 0 45px 45px; position: relative; overflow: hidden; }
        #liquid-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; pointer-events: none; }
        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; position: relative; z-index: 2; }
        .m-item { text-align: center; cursor: pointer; transition: 0.2s; }
        .m-item:active { transform: scale(0.9); }
        .m-icon { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 18px; display: inline-block; margin-bottom: 8px; backdrop-filter: blur(10px); }
        .s-card { background: #fff; margin: -25px 20px 25px 20px; padding: 25px; border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f1f1; position: relative; z-index: 5; }
        .history { padding: 0 25px 50px 25px; }
        .h-card { display: flex; align-items: center; padding: 15px; background: #fafafa; border-radius: 20px; margin-bottom: 10px; }
        .h-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .h-icon.in { background: #e8f8f0; color: #2ecc71; }
        .h-icon.out { background: #fdf2f2; color: #e74c3c; }
        #login-screen { width: 100%; max-width: 480px; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fff; }
        input { width: 100%; padding: 18px; margin: 10px 0; border: none; background: #f0f7ff; border-radius: 20px; outline: none; font-weight: 600; }
        .btn-l { width: 100%; padding: 18px; background: var(--blue); color: #fff; border: none; border-radius: 20px; font-weight: 800; margin-top: 15px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="width:100%; text-align:center;">
        <h1 style="color:var(--blue); font-size:35px;">SalNew Sultan</h1>
        <p style="color:#aaa; font-size:12px; margin-bottom:30px;">Action Ready V.100.3</p>
        <input type="text" id="inp-user" placeholder="Username">
        <input type="password" id="inp-pass" placeholder="PIN">
        <button class="btn-l" onclick="login()">MASUK</button>
    </div>
</div>

<div id="main-app" class="app">
    <div class="header">
        <canvas id="liquid-bg"></canvas>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; position:relative; z-index:2;">
            <h3>Halo, <span id="u-name"></span></h3>
            <div onclick="logout()"><i data-lucide="log-out" style="width:20px;"></i></div>
        </div>
        <div class="grid-menu">
            <div class="m-item" onclick="actionKirim()"><div class="m-icon"><i data-lucide="send"></i></div><p style="font-size:10px; font-weight:700;">Kirim</p></div>
            <div class="m-item" onclick="actionPulsa()"><div class="m-icon"><i data-lucide="smartphone"></i></div><p style="font-size:10px; font-weight:700;">Pulsa</p></div>
            <div class="m-item" onclick="Swal.fire('Top Up','Hubungi Admin Tomi','info')"><div class="m-icon"><i data-lucide="plus-circle"></i></div><p style="font-size:10px; font-weight:700;">Top Up</p></div>
            <div class="m-item" onclick="actionScan()"><div class="m-icon"><i data-lucide="qr-code"></i></div><p style="font-size:10px; font-weight:700;">Pindai</p></div>
        </div>
    </div>

    <div class="s-card">
        <div>
            <p style="font-size: 10px; color:#aaa; font-weight: 800;">SALDO SULTAN</p>
            <h2 id="u-balance" style="font-size: 28px; color:#222; margin-top: 5px;">Rp 0</h2>
        </div>
        <button onclick="actionScan()" style="background:var(--blue); color:#fff; border:none; padding:10px 20px; border-radius:15px; font-weight:bold; font-size:12px;">BAYAR</button>
    </div>

    <div class="history">
        <h4 style="margin-bottom:15px; font-size:14px; color:#333;">Riwayat Transaksi</h4>
        <div id="hist-list"></div>
    </div>
</div>

<script>
    // Efek Liquid Tetap Ada
    const canvas = document.getElementById('liquid-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function init() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
        for(let i=0; i<15; i++) particles.push({x:Math.random()*canvas.width, y:canvas.height+Math.random()*100, s:Math.random()*30+10, sp:Math.random()*1+0.5});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        particles.forEach(p => {
            p.y -= p.sp; if(p.y < -50) p.y = canvas.height+50;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    init(); draw(); lucide.createIcons();
</script>
</body>
</html>
