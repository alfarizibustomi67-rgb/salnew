<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalNew QR Sultan</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 350px; margin: 20px auto; border-radius: 15px; overflow: hidden; background: #1a1a1a; border: 2px solid #00ff88; }
        .btn { background: #00ff88; color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; background: #252525; min-height: 50px; }
        .sukses { color: #00ff88; border: 1px solid #00ff88; padding: 10px; border-radius: 5px; }
        .gagal { color: #ff4757; border: 1px solid #ff4757; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>SalNew Pay - SCAN QR</h2>
    <p style="color: #bbb;">Arahkan ke QR Berisi Link atau Kode "200"</p>

    <div id="reader"></div>
    <div id="status">Menyiapkan Kamera...</div>
    <button class="btn" onclick="location.reload()">Refresh Kamera</button>

    <script>
        const html5QrCode = new html5QrCode("reader");
        const statusElt = document.getElementById('status');

        const qrConfig = { fps: 20, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

        function mulaiScanner() {
            statusElt.innerText = "Membuka Kamera...";
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                qrConfig,
                (decodedText) => {
                    // LOGIKA BARU: JIKA SCAN LINK (http)
                    if (decodedText.startsWith("http")) {
                        statusElt.innerHTML = "<div class='sukses'>✅ LINK DITEMUKAN!<br>Mengarahkan ke: " + decodedText + "</div>";
                        
                        // Berhenti scan agar tidak duplikat
                        html5QrCode.stop();

                        // Tunggu 1 detik lalu buka link otomatis
                        setTimeout(() => {
                            window.location.href = decodedText.trim();
                        }, 1200);

                    } 
                    // LOGIKA LAMA: JIKA SCAN KODE "200"
                    else if (decodedText.trim() === "200") {
                        statusElt.innerHTML = "<div class='sukses'>✅ PEMBAYARAN BERHASIL!<br>Rp 200 Terbayar</div>";
                        html5QrCode.stop();
                    } 
                    // JIKA KODE SALAH
                    else {
                        statusElt.innerHTML = "<div class='gagal'>❌ KODE SALAH<br>Isi: " + decodedText + "</div>";
                    }
                }
            ).catch(err => {
                statusElt.innerHTML = "<div class='gagal'>Gagal: Pastikan izin kamera aktif!</div>";
            });
        }

        window.onload = mulaiScanner;
    </script>
</body>
</html>
