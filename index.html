<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalNew V.5 Liquid Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Config tetap sama
        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userPhones = { "Tomi": "081212", "user": "087878" };
        let saldoTerakhir = 0;

        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if ((u === "Tomi" && p === "11") || (u === "user" && p === "user")) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { Swal.fire('Gagal', 'Akses Ditolak!', 'error'); }
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display').innerText = user;
            const phone = userPhones[user];

            const balanceRef = ref(db, 'users/' + phone);
            onValue(balanceRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('user-balance').innerText = (user === "Tomi") ? "∞ Infinity" : "Rp " + data.saldo.toLocaleString('id-ID');
                    if(user === "Tomi") document.getElementById('premium-tag').style.display = "block";
                    
                    if (saldoTerakhir !== 0 && data.saldo > saldoTerakhir) {
                        new Audio('https://www.soundjay.com/misc/sounds/coins-purchase-1.mp3').play();
                        Swal.fire({ title: 'DANA MASUK!', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                    }
                    saldoTerakhir = data.saldo;
                }
            });
        }

        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.logout = () => { sessionStorage.clear(); location.reload(); };
        lucide.createIcons();
    </script>

    <style>
        :root { --liquid-blue: #108ee9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #e0f2ff; 
            display: flex; justify-content: center; overflow: hidden;
        }

        /* EFEK GELEMBUNG LIQUID BACKGROUND */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            filter: blur(40px) contrast(20); z-index: -1; background: #fff;
        }
        .bubble {
            position: absolute; background: var(--liquid-blue);
            border-radius: 50%; animation: move 15s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 200px) scale(1.5); }
        }

        /* LAYOUT APP */
        .app-container { 
            width: 100%; max-width: 480px; height: 100vh;
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); display: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        .header { 
            background: var(--liquid-blue); color: white; 
            padding: 50px 20px; border-radius: 0 0 40px 40px;
            text-align: center; position: relative;
            box-shadow: 0 10px 30px rgba(16, 142, 233, 0.3);
        }

        /* TOMBOL LIQUID STYLE */
        .btn-liquid {
            background: var(--liquid-blue); color: white;
            border: none; padding: 18px; border-radius: 25px;
            font-weight: bold; width: 100%; cursor: pointer;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 10px 20px rgba(16, 142, 233, 0.2);
        }
        .btn-liquid:active { transform: scale(0.9) rotate(2deg); }

        /* KARTU SALDO KENYAL */
        .card {
            background: white; margin: -30px 20px 20px 20px;
            padding: 25px; border-radius: 30px;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        #login-screen {
            width: 100%; max-width: 480px; height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.9); padding: 40px;
            border-radius: 40px; width: 100%; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: none; background: #f0f7ff; border-radius: 15px; outline: none;
        }
    </style>
</head>
<body>

<div class="liquid-bg">
    <div class="bubble" style="width:200px; height:200px; top:10%; left:10%;"></div>
    <div class="bubble" style="width:150px; height:150px; bottom:20%; right:10%; animation-delay: -2s;"></div>
    <div class="bubble" style="width:100px; height:100px; top:50%; left:50%; animation-delay: -5s;"></div>
</div>

<div id="login-screen">
    <div class="login-card">
        <h1 style="color:var(--liquid-blue); margin-bottom:10px;">SalNew</h1>
        <p style="font-size:12px; color:#aaa; margin-bottom:20px;">Liquid OS v26.4</p>
        <input type="text" id="inp-user" placeholder="Nama User">
        <input type="password" id="inp-pass" placeholder="Password">
        <button class="btn-liquid" onclick="login()">MASUK</button>
    </div>
</div>

<div id="main-app" class="app-container">
    <div class="header">
        <div id="premium-tag" style="display:none; color:#FFD700; font-weight:bold; font-size:12px;">★ PREMIUM SULTAN ★</div>
        <p style="opacity:0.8; margin-top:5px;">Halo, <b id="user-display"></b></p>
    </div>

    <div class="card">
        <p style="font-size:12px; color:#888;">Saldo Sultan Aktif</p>
        <h1 id="user-balance" style="font-size:35px; margin:10px 0; color:#222;">Rp 0</h1>
        <button class="btn-liquid" onclick="openModal('modal-kirim')" style="margin-top:15px;">KIRIM SALDO</button>
    </div>

    <div style="padding: 20px;">
        <button onclick="logout()" style="width:100%; background:none; border:2px solid #ff4757; color:#ff4757; padding:10px; border-radius:15px; font-weight:bold;">Keluar</button>
    </div>
</div>

<div id="modal-kirim" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); justify-content:center; align-items:center; z-index:100;">
    <div style="background:white; padding:30px; border-radius:35px; width:90%; max-width:380px; text-align:center;">
        <h3>Kirim Saldo</h3>
        <input type="text" id="target-phone" placeholder="Nomor Tujuan">
        <input type="number" id="amt-kirim" placeholder="Nominal">
        <button class="btn-liquid" onclick="alert('Fitur Kirim Aktif!')">KONFIRMASI</button>
        <button onclick="closeModal('modal-kirim')" style="margin-top:15px; border:none; background:none; color:red;">Batal</button>
    </div>
</div>

</body>
</html>
