<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalNew Super App</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: #1c1c1e; }
        
        .nav-top { background: var(--primary); color: white; padding: 50px 20px 30px; border-radius: 0 0 30px 30px; box-shadow: 0 10px 20px rgba(0,122,255,0.2); }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .wallet-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
        
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 25px; margin-top: -20px; }
        .menu-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #1c1c1e; }
        .icon-btn { width: 55px; height: 55px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); color: var(--primary); }

        .section { padding: 0 25px 100px; }
        .history-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .item-trx { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f7; }
        .item-trx:last-child { border: none; }

        /* Floating Nav */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(28,28,30,0.9); backdrop-filter: blur(15px); border-radius: 25px; height: 65px; display: flex; justify-content: space-around; align-items: center; color: white; }
    </style>
</head>
<body>

<div class="nav-top">
    <div class="user-info">
        <div>
            <p style="opacity: 0.8; font-size: 14px;">Selamat Datang,</p>
            <h2 id="display-name" style="letter-spacing: -1px;">User SalNew</h2>
        </div>
        <i data-lucide="bell"></i>
    </div>
    <div class="wallet-card">
        <p style="font-size: 12px; font-weight: 600; margin-bottom: 5px;">TOTAL SALDO</p>
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <h1 id="balance" style="font-size: 32px;">Rp •••••••</h1>
            <button onclick="toggleBalance()" style="background: none; border: none; color: white;"><i data-lucide="eye" id="eye-icon"></i></button>
        </div>
    </div>
</div>

<div class="menu-grid">
    <a href="#" class="menu-item" onclick="featureDev()">
        <div class="icon-btn"><i data-lucide="arrow-up-right"></i></div>
        <span style="font-size: 11px; font-weight: 700;">Transfer</span>
    </a>
    <a href="slot.html" class="menu-item">
        <div class="icon-btn" style="color: #ff9500;"><i data-lucide="layout-grid"></i></div>
        <span style="font-size: 11px; font-weight: 700;">Slot</span>
    </a>
    <a href="block.html" class="menu-item">
        <div class="icon-btn" style="color: #34c759;"><i data-lucide="gamepad-2"></i></div>
        <span style="font-size: 11px; font-weight: 700;">Games</span>
    </a>
    <a href="#" class="menu-item" onclick="featureDev()">
        <div class="icon-btn" style="color: #ff3b30;"><i data-lucide="plus-circle"></i></div>
        <span style="font-size: 11px; font-weight: 700;">TopUp</span>
    </a>
</div>

<div class="section">
    <h3 style="margin-bottom: 15px;">Riwayat Transaksi</h3>
    <div class="history-card" id="history-list">
        <p style="text-align: center; color: #8e8e93; padding: 20px;">Belum ada transaksi</p>
    </div>
</div>

<div class="bottom-nav">
    <i data-lucide="home" style="color: var(--primary);"></i>
    <i data-lucide="pie-chart" onclick="featureDev()"></i>
    <i data-lucide="user" onclick="featureDev()"></i>
    <i data-lucide="settings" onclick="featureDev()"></i>
</div>

<script>
    lucide.createIcons();
    let isShow = false;
    let realSaldo = 500000; // Nanti ini ambil dari Firebase kamu

    function toggleBalance() {
        const balEl = document.getElementById('balance');
        const eye = document.getElementById('eye-icon');
        
        if (!isShow) {
            // Cek PIN simulasi
            Swal.fire({
                title: 'Masukkan PIN',
                input: 'password',
                inputAttributes: { maxlength: 6, autofocus: 'true' },
                showCancelButton: true
            }).then((result) => {
                if (result.value === '1122') { // Password dari Saved Info kamu
                    balEl.innerText = 'Rp ' + realSaldo.toLocaleString('id-ID');
                    isShow = true;
                } else if (result.isConfirmed) {
                    Swal.fire('Error', 'PIN Salah!', 'error');
                }
            });
        } else {
            balEl.innerText = 'Rp •••••••';
            isShow = false;
        }
    }

    function featureDev() {
        Swal.fire({
            title: 'Segera Hadir',
            text: 'Fitur ini sedang disiapkan untuk update minggu depan!',
            icon: 'info',
            confirmButtonColor: '#007aff'
        });
    }

    // Simulasi Riwayat
    const hx = [
        { type: 'Bonus', amt: '+10.000', date: 'Hari ini', color: '#34c759' },
        { type: 'Slot Game', amt: '-5.000', date: 'Kemarin', color: '#ff3b30' }
    ];
    
    document.getElementById('history-list').innerHTML = hx.map(item => `
        <div class="item-trx">
            <div>
                <p style="font-weight: 700;">${item.type}</p>
                <small style="color: #8e8e93;">${item.date}</small>
            </div>
            <p style="font-weight: 800; color: ${item.color}">${item.amt}</p>
        </div>
    `).join('');

</script>
</body>
</html>
