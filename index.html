<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SalNew V.9 Functional</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userPhones = { "Tomi": "081212", "User": "087878" };
        let currentBalance = 0;

        // --- FUNGSI LOGIN ---
        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if ((u === "Tomi" && p === "11") || (u === "User" && p === "user")) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { 
                Swal.fire({ icon: 'error', title: 'Gagal', text: 'Nama atau Password salah!' });
            }
        };

        // --- MULAI APLIKASI ---
        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-name').innerText = user;
            const phone = userPhones[user];

            onValue(ref(db, 'users/' + phone), (snap) => {
                const data = snap.val();
                if (data) {
                    currentBalance = data.saldo;
                    document.getElementById('u-balance').innerText = (user === "Tomi") ? "∞ Infinity" : "Rp " + data.saldo.toLocaleString('id-ID');
                }
            });
        }

        // --- FUNGSI KIRIM (FUNCTIONAL) ---
        window.bukaKirim = async function() {
            const { value: formValues } = await Swal.fire({
                title: 'Kirim Saldo Sultan',
                html:
                    '<input id="swal-input1" class="swal2-input" placeholder="Nomor HP Tujuan">' +
                    '<input id="swal-input2" type="number" class="swal2-input" placeholder="Jumlah Rp">',
                focusConfirm: false,
                confirmButtonText: 'KIRIM SEKARANG',
                confirmButtonColor: '#108ee9',
                preConfirm: () => {
                    return [
                        document.getElementById('swal-input1').value,
                        document.getElementById('swal-input2').value
                    ]
                }
            });

            if (formValues) {
                const [targetPhone, amount] = formValues;
                const amt = parseInt(amount);
                const sender = sessionStorage.getItem('currentUser');
                const sPhone = userPhones[sender];

                if (!targetPhone || isNaN(amt) || amt <= 0) return Swal.fire('Error', 'Data tidak valid', 'error');

                const tRef = ref(db, 'users/' + targetPhone);
                const tSnap = await get(tRef);

                if (!tSnap.exists()) return Swal.fire('Gagal', 'Nomor tujuan tidak terdaftar!', 'error');

                if (sender === "Tomi" || currentBalance >= amt) {
                    // Update saldo tujuan
                    await update(tRef, { saldo: tSnap.val().saldo + amt });
                    // Potong saldo pengirim (jika bukan Tomi)
                    if (sender !== "Tomi") {
                        await update(ref(db, 'users/' + sPhone), { saldo: currentBalance - amt });
                    }
                    
                    Swal.fire('Berhasil!', `Rp ${amt.toLocaleString()} terkirim ke ${targetPhone}`, 'success');
                } else {
                    Swal.fire('Gagal', 'Saldo tidak cukup!', 'error');
                }
            }
        };

        // --- FUNGSI TOP UP (DANA STYLE) ---
        window.bukaTopUp = () => {
            Swal.fire({
                title: 'Top Up SalNew',
                text: 'Silakan hubungi Admin Tomi untuk menambah saldo Sultan kamu!',
                icon: 'info',
                confirmButtonColor: '#108ee9'
            });
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };
        lucide.createIcons();
    </script>

    <style>
        :root { --dana-blue: #108ee9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f4f7fa; display: flex; justify-content: center; }

        .bg-liquid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(50px) contrast(20); background: #fff; }
        .blob { position: absolute; background: var(--dana-blue); border-radius: 50%; animation: move 20s infinite alternate; opacity: 0.6; }
        @keyframes move { from { transform: translate(0,0) scale(1); } to { transform: translate(150px, 300px) scale(1.8); } }

        .app-container { width: 100%; max-width: 480px; min-height: 100vh; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); display: none; }

        /* HEADER DANA */
        .header { background: var(--dana-blue); color: white; padding: 60px 20px 40px 20px; border-radius: 0 0 40px 40px; }
        .main-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-top: 25px; }
        .menu-item { cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.85); }
        .menu-icon { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }

        /* KARTU SALDO */
        .balance-card { background: white; margin: -25px 20px 20px 20px; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        
        .btn-pay { background: var(--dana-blue); color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; }
        .btn-pay:active { transform: scale(0.9); }

        /* LOGIN */
        #login-screen { width: 100%; max-width: 480px; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .login-card { background: white; width: 100%; padding: 40px; border-radius: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 18px; margin: 10px 0; border: none; background: #f0f7ff; border-radius: 20px; outline: none; }
        .btn-login { width: 100%; padding: 18px; background: var(--dana-blue); color: white; border: none; border-radius: 20px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="bg-liquid">
    <div class="blob" style="width:250px; height:250px; top:5%; left:5%;"></div>
    <div class="blob" style="width:200px; height:200px; bottom:10%; right:5%;"></div>
</div>

<div id="login-screen">
    <div class="login-card">
        <h1 style="color:var(--dana-blue);">SalNew</h1>
        <p style="color:#aaa; font-size:12px; margin-bottom:30px;">Liquid & Functional V.9</p>
        <input type="text" id="inp-user" placeholder="Nama Akun">
        <input type="password" id="inp-pass" placeholder="Password">
        <button class="btn-login" onclick="login()">MASUK</button>
    </div>
</div>

<div id="main-app" class="app-container">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Halo, <span id="u-name"></span></h3>
            <i data-lucide="bell"></i>
        </div>

        <div class="main-menu">
            <div class="menu-item" onclick="Swal.fire('Fitur Scan','Kamera Pindai Segera Hadir!','info')">
                <div class="menu-icon"><i data-lucide="scan-line"></i></div>
                <p style="font-size: 11px;">Pindai</p>
            </div>
            <div class="menu-item" onclick="bukaTopUp()">
                <div class="menu-icon"><i data-lucide="plus-circle"></i></div>
                <p style="font-size: 11px;">Isi Saldo</p>
            </div>
            <div class="menu-item" onclick="bukaKirim()">
                <div class="menu-icon"><i data-lucide="send"></i></div>
                <p style="font-size: 11px;">Kirim</p>
            </div>
            <div class="menu-item" onclick="Swal.fire('Minta Saldo','Tunjukkan QR ini ke teman!','success')">
                <div class="menu-icon"><i data-lucide="download"></i></div>
                <p style="font-size: 11px;">Minta</p>
            </div>
        </div>
    </div>

    <div class="balance-card">
        <div>
            <p style="font-size: 11px; color:#888;">Saldo SalNew</p>
            <h2 id="u-balance">Rp 0</h2>
        </div>
        <button class="btn-pay" onclick="location.href='shop.html'">BELI HP</button>
    </div>

    <div style="padding: 20px; text-align: center;">
        <button onclick="logout()" style="background:none; border:none; color:#ff4757; font-weight:bold; cursor:pointer;">Keluar Akun</button>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
