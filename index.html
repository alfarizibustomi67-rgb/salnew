<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalNew Sultan - Anti Hilang</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: linear-gradient(135deg, #1e1e1e, #2d2d2d); border-radius: 20px; padding: 25px; border: 1px solid #00ff88; box-shadow: 0 10px 30px rgba(0,255,136,0.2); margin-bottom: 20px; }
        h1 { color: #00ff88; margin: 0; font-size: 1.2rem; }
        .saldo { font-size: 2.5rem; font-weight: bold; margin: 15px 0; color: #fff; }
        #reader { width: 100%; max-width: 300px; margin: 20px auto; border-radius: 15px; border: 2px dashed #00ff88; overflow: hidden; }
        .btn { background: #00ff88; color: black; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #bbb; }
    </style>
</head>
<body>

    <div class="card">
        <h1>SALNEW SULTAN 💎</h1>
        <div style="font-size: 0.8rem; color: #888;">Pemilik: Bustomi Alfarizi</div>
        <div class="saldo" id="displaySaldo">Rp 0</div>
        <button class="btn" onclick="tambahSaldoManual()">+ Top Up Rp 50.000</button>
        <button class="btn" style="background: #ff4757;" onclick="resetSaldo()">Reset Saldo</button>
    </div>

    <div id="reader"></div>
    <div id="status">Siap Scan Kode "200"...</div>
    <button class="btn" style="background: #252525; color: white;" onclick="location.reload()">Refresh Kamera</button>

    <script>
        // --- LOGIKA SIMPAN MEMORI HP ---
        let saldoSaatIni = localStorage.getItem('saldoSalNew') ? parseInt(localStorage.getItem('saldoSalNew')) : 0;

        function updateTampilan() {
            document.getElementById('displaySaldo').innerText = "Rp " + saldoSaatIni.toLocaleString('id-ID');
            localStorage.setItem('saldoSalNew', saldoSaatIni);
        }

        function tambahSaldoManual() {
            saldoSaatIni += 50000;
            updateTampilan();
        }

        function resetSaldo() {
            if(confirm("Yakin mau reset jadi Rp 0?")) {
                saldoSaatIni = 0;
                updateTampilan();
            }
        }

        // --- LOGIKA SCANNER ---
        const html5QrCode = new Html5Qrcode("reader");
        
        function mulaiScan() {
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (decodedText) => {
                // Jika scan kode "200"
                if (decodedText.trim() === "200") {
                    document.getElementById('status').innerHTML = "<b style='color:#00ff88'>✅ PEMBAYARAN BERHASIL! +200rb</b>";
                    saldoSaatIni += 200000;
                    updateTampilan();
                    html5QrCode.stop();
                } 
                // Jika scan link
                else if (decodedText.startsWith("http")) {
                    window.location.href = decodedText;
                } else {
                    document.getElementById('status').innerHTML = "❌ Kode Salah: " + decodedText;
                }
            }).catch(err => {
                document.getElementById('status').innerHTML = "Kamera tidak aktif.";
            });
        }

        // Jalankan saat web dibuka
        window.onload = () => {
            updateTampilan();
            mulaiScan();
        };
    </script>
</body>
</html>
