<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalNew V.100.11 Fix</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push, query, limitToLast, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // DATABASE USER TETAP
        const userDatabase = {
            "Tomi": { pass: "11", phone: "081212" },
            "T": { pass: "12", phone: "087878" }
        };

        let currentBalance = 0;

        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if (userDatabase[u] && userDatabase[u].pass === p) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { Swal.fire('Gagal', 'PIN Salah!', 'error'); }
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-name').innerText = user;
            const phone = userDatabase[user].phone;

            onValue(ref(db, 'users/' + phone), (snap) => {
                const data = snap.val();
                if (data) {
                    currentBalance = data.saldo;
                    document.getElementById('u-balance').innerText = (user === "Tomi") ? "Rp 100.000" : "Rp " + data.saldo.toLocaleString('id-ID');
                    if(user === "Tomi") {
                        document.getElementById('vip-tag').style.display = 'inline-block';
                        document.getElementById('admin-tools').style.display = 'block';
                    }
                }
            });

            const hRef = query(ref(db, 'history/' + phone), limitToLast(10));
            onValue(hRef, (snap) => {
                const list = document.getElementById('hist-list');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const item = child.val();
                    const isIn = item.type === "MASUK";
                    list.innerHTML = `<div class="h-card"><div class="h-icon ${isIn ? 'in' : 'out'}"><i data-lucide="${isIn ? 'arrow-down-left' : 'arrow-up-right'}"></i></div><div style="flex:1; margin-left:15px;"><p style="font-weight:700; font-size:13px;">${item.note || 'Transaksi'}</p><p style="font-size:10px; color:#999;">${item.date}</p></div><p style="font-weight:800; color:${isIn ? '#2ecc71' : '#e74c3c'}">${isIn ? '+' : '-'} Rp ${item.amt.toLocaleString()}</p></div>` + list.innerHTML;
                });
                lucide.createIcons();
            });
        }

        // FUNGSI TRANSAKSI UMUM (Untuk Pulsa & Scan)
        async function processSimpleTransaction(amount, note) {
            const user = sessionStorage.getItem('currentUser');
            const phone = userDatabase[user].phone;
            if (user === "Tomi" || currentBalance >= amount) {
                const now = new Date().toLocaleString();
                if(user !== "Tomi") await update(ref(db, 'users/' + phone), { saldo: currentBalance - amount });
                await push(ref(db, 'history/' + phone), { type: 'KELUAR', amt: amount, date: now, note: note });
                Swal.fire('Sukses!', note, 'success');
            } else { Swal.fire('Gagal', 'Saldo Tidak Cukup', 'error'); }
        }

        window.actionPulsa = async () => {
            const { value: target } = await Swal.fire({ title: 'Beli Pulsa', input: 'text', inputPlaceholder: 'Masukkan Nomor HP' });
            if (!target) return;
            const { value: nominal } = await Swal.fire({ 
                title: 'Pilih Nominal', 
                input: 'select', 
                inputOptions: { '5000': '5.000', '10000': '10.000', '20000': '20.000' } 
            });
            if (nominal) processSimpleTransaction(parseInt(nominal), 'Beli Pulsa ke ' + target);
        };

        window.actionScan = async () => {
            const { value: amt } = await Swal.fire({ title: 'Bayar QRIS', input: 'number', inputPlaceholder: 'Masukkan Nominal Rp' });
            if (amt > 0) processSimpleTransaction(parseInt(amt), 'Pembayaran QRIS Merchant');
        };

        window.actionKirim = async () => {
            const { value: target } = await Swal.fire({ title: 'Nomor Tujuan', input: 'text', inputPlaceholder: 'Contoh: 087878' });
            const { value: amt } = await Swal.fire({ title: 'Jumlah Transfer', input: 'number' });
            
            if (target && amt > 0) {
                const sender = sessionStorage.getItem('currentUser');
                // LOGIKA FIX: Mencari data di path users/nomor_tujuan
                const tRef = ref(db, 'users/' + target);
                const tSnap = await get(tRef);

                if (tSnap.exists()) {
                    const amount = parseInt(amt);
                    if (sender === "Tomi" || currentBalance >= amount) {
                        const now = new Date().toLocaleString();
                        // 1. Tambah saldo penerima
                        await update(tRef, { saldo: (tSnap.val().saldo || 0) + amount });
                        await push(ref(db, 'history/' + target), { type: 'MASUK', amt: amount, date: now, note: 'Transfer dari ' + sender });
                        
                        // 2. Kurangi saldo pengirim (Jika bukan Tomi)
                        if(sender !== "Tomi") {
                            await update(ref(db, 'users/' + userDatabase[sender].phone), { saldo: currentBalance - amount });
                        }
                        await push(ref(db, 'history/' + userDatabase[sender].phone), { type: 'KELUAR', amt: amount, date: now, note: 'Kirim ke ' + target });
                        
                        Swal.fire('Berhasil!', 'Saldo Rp ' + amount.toLocaleString() + ' terkirim.', 'success');
                    } else { Swal.fire('Gagal', 'Saldo tidak cukup!', 'error'); }
                } else { 
                    Swal.fire('Error', 'Nomor ' + target + ' belum terdaftar di database!', 'error'); 
                }
            }
        };

        window.clearHistory = async () => {
            const phone = userDatabase[sessionStorage.getItem('currentUser')].phone;
            const res = await Swal.fire({ title: 'Hapus Riwayat?', icon: 'warning', showCancelButton: true });
            if (res.isConfirmed) { await remove(ref(db, 'history/' + phone)); Swal.fire('Sukses'); }
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };
    </script>

    <style>
        :root { --blue: #007aff; --bg: #f2f7ff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--bg); display: none; }
        .header { background: linear-gradient(180deg, #007aff 0%, #5ac8fa 100%); color: #fff; padding: 60px 25px 100px 25px; border-radius: 0 0 50px 50px; }
        .s-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); margin: -70px 20px 25px 20px; padding: 30px; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.5); position: relative; z-index: 5; }
        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .m-item { text-align: center; cursor: pointer; }
        .m-icon { background: rgba(255, 255, 255, 0.2); padding: 12px; border-radius: 20px; display: inline-block; margin-bottom: 8px; backdrop-filter: blur(10px); }
        .history { padding: 0 25px 40px 25px; }
        .h-card { display: flex; align-items: center; padding: 18px; background: #fff; border-radius: 25px; margin-bottom: 12px; border: 1px solid #f0f0f0; }
        .h-icon { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .h-icon.in { background: #eefdf5; color: #2ecc71; }
        .h-icon.out { background: #fff5f5; color: #e74c3c; }
        #vip-tag { background: #ffcc00; color: #000; font-size: 10px; padding: 4px 10px; border-radius: 12px; font-weight: 900; }
        #admin-tools { display: none; margin-bottom: 15px; }
        .btn-reset { color: #ff4d4f; border: none; background: none; font-size: 12px; font-weight: 700; cursor: pointer; }
        #login-screen { width: 100%; max-width: 480px; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fff; }
        input { width: 100%; padding: 20px; margin: 12px 0; border: none; background: #f5f9ff; border-radius: 22px; outline: none; font-weight: 600; }
        .btn-l { width: 100%; padding: 20px; background: var(--blue); color: #fff; border: none; border-radius: 22px; font-weight: 800; font-size: 16px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="width:100%; text-align:center;">
        <div style="background:var(--blue); width:70px; height:70px; border-radius:25px; margin:0 auto 20px auto; display:flex; align-items:center; justify-content:center; color:#fff;"><i data-lucide="wallet" size="35"></i></div>
        <h2 style="color:#222;">SalNew Sultan</h2>
        <p style="font-size:12px; color:#aaa; margin-bottom:30px;">V.100.11 Fix System</p>
        <input type="text" id="inp-user" placeholder="Username">
        <input type="password" id="inp-pass" placeholder="PIN">
        <button class="btn-l" onclick="login()">Login</button>
    </div>
</div>

<div id="main-app" class="app">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <p style="font-size:12px; opacity:0.8;">Halo,</p>
                <h3 style="font-size:20px;"><span id="u-name"></span> <span id="vip-tag" style="display:none;">VIP</span></h3>
            </div>
            <div onclick="logout()" style="background:rgba(255,255,255,0.2); padding:10px; border-radius:15px;"><i data-lucide="log-out" size="20"></i></div>
        </div>
        <div class="grid-menu">
            <div class="m-item" onclick="actionKirim()"><div class="m-icon"><i data-lucide="send"></i></div><p style="font-size:11px; font-weight:600;">Kirim</p></div>
            <div class="m-item" onclick="actionPulsa()"><div class="m-icon"><i data-lucide="smartphone"></i></div><p style="font-size:11px; font-weight:600;">Pulsa</p></div>
            <div class="m-item" onclick="actionScan()"><div class="m-icon"><i data-lucide="qr-code"></i></div><p style="font-size:11px; font-weight:600;">Scan</p></div>
            <div class="m-item" onclick="Swal.fire('Menu','Fitur lainnya segera hadir','info')"><div class="m-icon"><i data-lucide="layout-grid"></i></div><p style="font-size:11px; font-weight:600;">Menu</p></div>
        </div>
    </div>
    <div class="s-card">
        <p style="font-size: 11px; color:#999; font-weight: 800;">TOTAL SALDO</p>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <h2 id="u-balance" style="font-size: 32px; color:#222;">Rp 0</h2>
            <button onclick="actionKirim()" style="background:var(--blue); color:#fff; border:none; padding:10px 20px; border-radius:18px; font-weight:800; font-size:12px;">BAYAR</button>
        </div>
    </div>
    <div class="history">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h4 style="font-size:15px; font-weight:800; color:#222;">Riwayat Transaksi</h4>
            <div id="admin-tools"><button class="btn-reset" onclick="clearHistory()">Bersihkan</button></div>
        </div>
        <div id="hist-list"></div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
