<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SalNew V.100 Full</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJjwhgy_zZAfmUKTWez1aH4wE2icA6dg",
            authDomain: "salnew.firebaseapp.com",
            databaseURL: "https://salnew-default-rtdb.firebaseio.com",
            projectId: "salnew",
            storageBucket: "salnew.firebasestorage.app",
            messagingSenderId: "542817424491",
            appId: "1:542817424491:web:d04abd155d47cb29c8cd2e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userPhones = { "Tomi": "081212", "User": "087878" };
        let currentBalance = 0;

        window.login = function() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if ((u === "Tomi" && p === "11") || (u === "User" && p === "user")) {
                sessionStorage.setItem('currentUser', u);
                startApp(u);
            } else { 
                Swal.fire('Gagal', 'Akses Sultan Ditolak!', 'error'); 
            }
        };

        function startApp(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('u-name').innerText = user;
            const phone = userPhones[user];

            // Update Saldo Real-time
            onValue(ref(db, 'users/' + phone), (snap) => {
                const data = snap.val();
                if (data) {
                    currentBalance = data.saldo;
                    document.getElementById('u-balance').innerText = (user === "Tomi") ? "∞ Infinity" : "Rp " + data.saldo.toLocaleString('id-ID');
                    if(user === "Tomi") document.getElementById('vip-tag').style.display = 'inline-block';
                }
            });

            // Update History Real-time
            const hRef = query(ref(db, 'history/' + phone), limitToLast(8));
            onValue(hRef, (snap) => {
                const list = document.getElementById('hist-list');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const item = child.val();
                    const isIn = item.type === "MASUK";
                    list.innerHTML = `
                        <div class="h-card">
                            <div class="h-icon ${isIn ? 'in' : 'out'}"><i data-lucide="${isIn ? 'arrow-down-left' : 'arrow-up-right'}"></i></div>
                            <div style="flex:1; margin-left:15px;">
                                <p style="font-weight:700; font-size:14px;">Saldo ${isIn ? 'Masuk' : 'Keluar'}</p>
                                <p style="font-size:10px; color:#aaa;">${item.date}</p>
                            </div>
                            <p style="font-weight:800; color:${isIn ? '#2ecc71' : '#e74c3c'}">${isIn ? '+' : '-'} Rp ${item.amt.toLocaleString()}</p>
                        </div>
                    ` + list.innerHTML;
                });
                lucide.createIcons();
            });
        }

        window.actionKirim = async () => {
            const { value: pin } = await Swal.fire({
                title: 'Konfirmasi PIN',
                input: 'password',
                inputPlaceholder: '6 Digit PIN',
                inputAttributes: { maxlength: 6 }
            });

            if (pin === "112233" || sessionStorage.getItem('currentUser') === "Tomi") {
                const { value: target } = await Swal.fire({ title: 'Nomor HP Tujuan', input: 'text' });
                const { value: amt } = await Swal.fire({ title: 'Jumlah Rp', input: 'number' });
                
                if (target && amt > 0) {
                    const sender = sessionStorage.getItem('currentUser');
                    const tRef = ref(db, 'users/' + target);
                    const tSnap = await get(tRef);

                    if (tSnap.exists()) {
                        const amount = parseInt(amt);
                        if (sender === "Tomi" || currentBalance >= amount) {
                            const now = new Date().toLocaleString();
                            // Update Penerima
                            await update(tRef, { saldo: tSnap.val().saldo + amount });
                            push(ref(db, 'history/' + target), { type: 'MASUK', amt: amount, date: now });
                            
                            // Update Pengirim
                            if(sender !== "Tomi") {
                                await update(ref(db, 'users/' + userPhones[sender]), { saldo: currentBalance - amount });
                            }
                            push(ref(db, 'history/' + userPhones[sender]), { type: 'KELUAR', amt: amount, date: now });

                            Swal.fire('Berhasil!', 'Saldo Terkirim!', 'success');
                        } else { Swal.fire('Gagal', 'Saldo Tidak Cukup', 'warning'); }
                    } else { Swal.fire('Error', 'Nomor Tidak Terdaftar', 'error'); }
                }
            } else { Swal.fire('Gagal', 'PIN Salah!', 'error'); }
        };

        window.logout = () => { sessionStorage.clear(); location.reload(); };
        lucide.createIcons();
    </script>

    <style>
        :root { --blue: #108ee9; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f0f4f8; display: flex; justify-content: center; }

        .app { width: 100%; max-width: 480px; min-height: 100vh; background: #fff; display: none; }
        
        .header { background: var(--blue); color: #fff; padding: 60px 25px 40px 25px; border-radius: 0 0 45px 45px; }
        .u-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .m-item { text-align: center; cursor: pointer; transition: 0.2s; }
        .m-item:active { transform: scale(0.85); }
        .m-icon { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 18px; display: inline-block; margin-bottom: 8px; backdrop-filter: blur(10px); }

        .s-card { background: #fff; margin: -25px 20px 25px 20px; padding: 25px; border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f1f1; }
        
        .history { padding: 0 25px 50px 25px; }
        .h-card { display: flex; align-items: center; padding: 15px; background: #fafafa; border-radius: 20px; margin-bottom: 10px; }
        .h-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .h-icon.in { background: #e8f8f0; color: #2ecc71; }
        .h-icon.out { background: #fdf2f2; color: #e74c3c; }

        #vip-tag { background: linear-gradient(to right, #ffd700, #ffa500); color: #fff; font-size: 9px; padding: 3px 8px; border-radius: 10px; margin-left: 5px; font-weight: 800; display: none; }

        #login-screen { width: 100%; max-width: 480px; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; background: #fff; }
        input { width: 100%; padding: 18px; margin: 10px 0; border: none; background: #f0f7ff; border-radius: 20px; outline: none; font-weight: 600; }
        .btn-l { width: 100%; padding: 18px; background: var(--blue); color: #fff; border: none; border-radius: 20px; font-weight: 800; margin-top: 15px; box-shadow: 0 10px 20px rgba(16,142,233,0.2); }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="width:100%; text-align:center;">
        <h1 style="color:var(--blue); font-size:35px; letter-spacing:-1px;">SalNew Sultan</h1>
        <p style="color:#aaa; font-size:12px; margin-bottom:30px;">Premium Digital Wallet V.100</p>
        <input type="text" id="inp-user" placeholder="Nama Akun">
        <input type="password" id="inp-pass" placeholder="Password">
        <button class="btn-l" onclick="login()">MASUK</button>
    </div>
</div>

<div id="main-app" class="app">
    <div class="header">
        <div class="u-info">
            <h3>Halo, <span id="u-name"></span> <span id="vip-tag">VIP GOLD</span></h3>
            <div onclick="logout()"><i data-lucide="log-out" style="width:20px; opacity:0.7;"></i></div>
        </div>
        <div class="grid-menu">
            <div class="m-item" onclick="actionKirim()"><div class="m-icon"><i data-lucide="send"></i></div><p style="font-size:10px; font-weight:700;">Kirim</p></div>
            <div class="m-item" onclick="location.href='shop.html'"><div class="m-icon"><i data-lucide="smartphone"></i></div><p style="font-size:10px; font-weight:700;">Beli HP</p></div>
            <div class="m-item" onclick="Swal.fire('Top Up','Hubungi Admin Tomi!','info')"><div class="m-icon"><i data-lucide="plus-circle"></i></div><p style="font-size:10px; font-weight:700;">Top Up</p></div>
            <div class="m-item" onclick="Swal.fire('Scan QR','Segera Hadir!','info')"><div class="m-icon"><i data-lucide="qr-code"></i></div><p style="font-size:10px; font-weight:700;">Pindai</p></div>
        </div>
    </div>

    <div class="s-card">
        <div>
            <p style="font-size: 10px; color:#aaa; font-weight: 800;">TOTAL SALDO</p>
            <h2 id="u-balance" style="font-size: 28px; color:#222; margin-top: 5px;">Rp 0</h2>
        </div>
        <button onclick="actionKirim()" style="background:var(--blue); color:#fff; border:none; padding:10px 20px; border-radius:15px; font-weight:bold; font-size:12px;">BAYAR</button>
    </div>

    <div class="history">
        <h4 style="margin-bottom:15px; font-size:14px; color:#333;">Riwayat Transaksi</h4>
        <div id="hist-list"></div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
